name: CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Check Java version
        run: java -version

      - name: Grant Maven Wrapper permission
        run: chmod +x mvnw

      - name: Build application
        run: ./mvnw clean package

      - name: Build Docker image
        run: docker build -t cicd-test:latest .

      - name: Remove old container
        run: |
          docker stop cicd-test || true
          docker rm cicd-test || true

      - name: Remove container using port 8080
        run: |
          docker ps -q --filter publish=8080 | xargs -r docker rm -f

      - name: Run new container
        run: |
          docker run -d \
            --name cicd-test \
            --restart unless-stopped \
            -p 8080:8080 \
            cicd-test:latest

      - name: Verify deployment
        run: |
          sleep 10
          curl --fail http://localhost:8080